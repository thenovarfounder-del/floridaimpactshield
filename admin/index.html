<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Florida Impact Shield</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#060E1A;color:#f0f7ff}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lb{background:#0a1628;border:1px solid rgba(14,165,233,0.3);border-radius:12px;padding:48px;width:100%;max-width:400px;text-align:center}
input[type=password]{width:100%;padding:12px 16px;background:rgba(0,0,0,0.4);border:1px solid rgba(14,165,233,0.3);border-radius:6px;font-size:14px;outline:none;margin-bottom:16px;color:#fff}
.bp{background:#0ea5e9;color:#fff;border:none;border-radius:6px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.sc{background:#0a1628;border:1px solid rgba(14,165,233,0.2);border-radius:8px;padding:20px}
.sv{font-size:32px;font-weight:800;margin-bottom:4px;color:#38bdf8}
.tw{background:#0a1628;border:1px solid rgba(14,165,233,0.15);border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(14,165,233,0.1);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid rgba(100,116,139,0.08);vertical-align:middle;color:#94a3b8}
tr:hover td{background:rgba(14,165,233,0.03)}
.empty{padding:48px;text-align:center;color:#475569}
.ab{padding:5px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:none;margin:0 2px}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="lw" id="LW">
  <div class="lb">
    <div style="font-size:48px;margin-bottom:16px">🛡️</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:8px;color:#fff">Florida Impact Shield</div>
    <div style="font-size:14px;color:#64748b;margin-bottom:24px">Admin Panel</div>
    <input type="password" id="PW" placeholder="Enter password" onkeydown="if(event.key==='Enter')LGN()">
    <button class="bp" onclick="LGN()">Access Admin</button>
  </div>
</div>

<div id="DW" style="display:none;padding:32px 20px;max-width:1400px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <div>
      <div style="font-size:24px;font-weight:700;color:#fff">Florida Impact Shield — Leads</div>
      <div style="font-size:14px;color:#64748b;margin-top:4px" id="TC">Loading...</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <a href="/" target="_blank" class="btn" style="background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.25);color:#38bdf8;text-decoration:none">View Site</a>
      <button class="btn" style="background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.25);color:#38bdf8" onclick="LOAD()">↻ Refresh</button>
      <button class="btn" style="background:#0ea5e9;color:#fff" onclick="PALL()">Print All</button>
      <button class="btn" style="background:none;border:1px solid #475569;color:#64748b" onclick="LGT()">Logout</button>
    </div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sv" id="S1">0</div><div style="font-size:12px;color:#64748b">Total Leads</div></div>
    <div class="sc"><div class="sv" id="S2" style="color:#4ade80">0</div><div style="font-size:12px;color:#64748b">Grant Inquiries</div></div>
    <div class="sc"><div class="sv" id="S3" style="color:#f59e0b">0</div><div style="font-size:12px;color:#64748b">Contact Forms</div></div>
    <div class="sc"><div class="sv" id="S4" style="color:#a78bfa">0</div><div style="font-size:12px;color:#64748b">Today</div></div>
  </div>

  <div style="display:flex;gap:10px;margin-bottom:16px">
    <button class="btn" id="B1" onclick="FILT('all',this)" style="background:#0ea5e9;color:#fff">All Leads</button>
    <button class="btn" id="B2" onclick="FILT('grant',this)" style="background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.25);color:#38bdf8">Grant Pages</button>
    <button class="btn" id="B3" onclick="FILT('contact',this)" style="background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.25);color:#38bdf8">Contact Forms</button>
  </div>

  <div class="tw">
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>What They Need</th><th>Source</th><th>Date</th>
        </tr></thead>
        <tbody id="TB"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var PW="FIS2026!";
var SB="https://ehjhsbrcbtqcvmgzjzkm.supabase.co";
var SK="sb_secret_B9AG8VXwdsj5D5SK7Ebn6g_KRLgiHOZ";
var LD=[];
var CF="all";

function LGN(){
  if(document.getElementById("PW").value===PW){
    document.getElementById("LW").style.display="none";
    document.getElementById("DW").style.display="block";
    LOAD();
  } else { alert("Wrong password"); }
}

function LGT(){
  document.getElementById("LW").style.display="flex";
  document.getElementById("DW").style.display="none";
  document.getElementById("PW").value="";
  LD=[];
}

async function LOAD(){
  document.getElementById("TB").innerHTML="<tr><td colspan=7 class=empty>Loading...</td></tr>";
  document.getElementById("TC").textContent="Loading...";

  var h1={"apikey":SK,"Authorization":"Bearer "+SK};
  var r1=[],r2=[];

  try{
    var res1=await fetch(SB+"/rest/v1/fis_leads?order=created_at.desc&limit=500",{headers:h1});
    var d1=await res1.json();
    if(Array.isArray(d1)){
      r1=d1.map(function(l){return{
        name:((l.first_name||"")+" "+(l.last_name||"")).trim(),
        phone:l.phone||"",
        email:l.email||"",
        address:"",
        message:l.message||"",
        source:l.page||l.type||"contact-form",
        created_at:l.created_at,
        is_grant:false
      };});
    }
  }catch(e){console.log("fis_leads error:",e.message);}

  try{
    var res2=await fetch(SB+"/rest/v1/contact_submissions?order=created_at.desc&limit=500",{headers:h1});
    var d2=await res2.json();
    if(Array.isArray(d2)){
      r2=d2.map(function(l){return{
        name:l.name||"",
        phone:l.phone||"",
        email:l.email||"",
        address:l.address||"",
        message:l.message||"",
        source:l.source||"grant-page",
        created_at:l.created_at,
        is_grant:true
      };});
    }
  }catch(e){console.log("contact_submissions error:",e.message);}

  LD=r1.concat(r2).sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  STAT();
  REND();
}

function STAT(){
  var now=new Date();
  var today=now.toDateString();
  var grants=LD.filter(function(l){return l.is_grant;});
  var contacts=LD.filter(function(l){return !l.is_grant;});
  var todayL=LD.filter(function(l){return new Date(l.created_at).toDateString()===today;});
  document.getElementById("S1").textContent=LD.length;
  document.getElementById("S2").textContent=grants.length;
  document.getElementById("S3").textContent=contacts.length;
  document.getElementById("S4").textContent=todayL.length;
  document.getElementById("TC").textContent=LD.length+" total leads";
}

function ESC(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function REND(){
  var tb=document.getElementById("TB");
  var list=LD;
  if(CF==="grant")list=LD.filter(function(l){return l.is_grant;});
  if(CF==="contact")list=LD.filter(function(l){return !l.is_grant;});

  if(!list.length){tb.innerHTML="<tr><td colspan=7 class=empty>No leads yet.</td></tr>";return;}

  var h="";
  for(var i=0;i<list.length;i++){
    var l=list[i];
    var dt=l.created_at?new Date(l.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
    var sc=l.is_grant?"background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.2)":"background:rgba(14,165,233,0.12);color:#38bdf8;border:1px solid rgba(14,165,233,0.2)";
    h+="<tr>";
    h+='<td style="color:#fff;font-weight:600">'+ESC(l.name||'—')+'</td>';
    h+='<td>'+(l.phone?'<a href="tel:'+l.phone+'" style="color:#4ade80;font-weight:600">'+ESC(l.phone)+'</a>':'—')+'</td>';
    h+='<td>'+(l.email?'<a href="mailto:'+l.email+'" style="color:#38bdf8">'+ESC(l.email)+'</a>':'—')+'</td>';
    h+='<td style="font-size:12px">'+ESC(l.address||'—')+'</td>';
    h+='<td style="font-size:12px;max-width:200px">'+ESC(l.message||'—')+'</td>';
    h+='<td><span style="'+sc+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block">'+ESC(l.source||'unknown')+'</span></td>';
    h+='<td style="font-size:12px;color:#64748b">'+dt+'</td>';
    h+="</tr>";
  }
  tb.innerHTML=h;
}

function FILT(type,btn){
  CF=type;
  document.querySelectorAll(".btn").forEach(function(b){
    if(b.id&&b.id.match(/^B/)){
      b.style.background="rgba(14,165,233,0.1)";
      b.style.color="#38bdf8";
    }
  });
  btn.style.background="#0ea5e9";
  btn.style.color="#fff";
  REND();
}

function PALL(){
  var w=window.open("","_blank");
  w.document.write("<html><head><title>FIS Leads</title><style>body{font-family:Arial;font-size:11px;padding:20px}h1{font-size:16px}table{width:100%;border-collapse:collapse}th{background:#0ea5e9;color:#fff;padding:7px;text-align:left;font-size:10px}td{padding:7px;border-bottom:1px solid #eee;font-size:10px}tr:nth-child(even){background:#f9f9f9}</style></head><body>");
  w.document.write("<h1>Florida Impact Shield - Leads</h1><p>"+new Date().toLocaleString()+" - "+LD.length+" leads</p>");
  w.document.write("<table><thead><tr><th>#</th><th>Date</th><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Message</th><th>Source</th></tr></thead><tbody>");
  LD.forEach(function(l,i){
    w.document.write("<tr><td>"+(i+1)+"</td><td>"+new Date(l.created_at).toLocaleDateString()+"</td><td>"+(l.name||"-")+"</td><td>"+(l.phone||"-")+"</td><td>"+(l.email||"-")+"</td><td>"+(l.address||"-")+"</td><td>"+(l.message||"-")+"</td><td>"+(l.source||"-")+"</td></tr>");
  });
  w.document.write("</tbody></table></body></html>");
  w.document.close();setTimeout(function(){w.print();},400);
}
</script>
</body>
</html>
