<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0ea5e9"/>
    <stop offset="100%" stop-color="#0284c7"/>
  </linearGradient>
  <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#bae6fd"/>
  </linearGradient>
</defs>
<!-- Background -->
<rect width="100" height="100" fill="#0c2a45" rx="12"/>
<!-- Top blue accent line -->
<rect x="0" y="0" width="100" height="4" fill="#38bdf8" rx="2"/>
<!-- Star at top of shield -->
<polygon points="50,8 53,16 61,16 55,21 57,29 50,24 43,29 45,21 39,16 47,16" fill="#38bdf8" opacity="0.9"/>
<!-- Shield -->
<path d="M20,28 L80,28 L80,68 C80,84 52,94 50,95 C48,94 20,84 20,68 Z" fill="#0a1f33" stroke="#38bdf8" stroke-width="2"/>
<!-- Inner shield line -->
<path d="M26,34 L74,34 L74,67 C74,81 52,89 50,90 C48,89 26,81 26,67 Z" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3"/>
<!-- Lightning bolt -->
<path d="M57,40 L43,62 L52,62 L46,80 L62,56 L53,56 Z" fill="url(#bolt)"/>
<!-- Bottom accent -->
<rect x="0" y="96" width="100" height="4" fill="#0284c7" rx="2"/>
</svg>